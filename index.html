<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PyKV Web Console</title>
    <link rel="stylesheet" href="/static/style.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <main class="app">
            <button id="dashboard-logout" class="dashboard-logout">Sign Out</button>
        <div class="wrapper" id="login-card">
            <div class="title-row">
                <h2>Sign In</h2>
                <div id="auth-status" class="auth-status">Not signed in</div>
            </div>

            <form id="login-form">
                <h1>Login</h1>
            <div class="input-box">
                <input id="username" type="text" placeholder="username" value="admin" required autofocus>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="password" id="password" type="password" value="admin123" required  placeholder="Password">
                <i class='bx bxs-lock-alt'></i>
            </div>
            <div class="remember-forget">
                <label ><input type="checkbox" >
                Remember me</label>
                <a href="#"> Forgot Password?</a>
            </div>
            <button type="submit" class="btn">Log in</button>
            <div class="register-link">
                <p>Don't have a account?  <a href="#">Register</a></p>
            </div>
            </form>
            </div>
        </div>
        

        <div class="side-by-side-container">
            

            <section class="card" id="info-card">
                <h2>Server Info</h2>
                <div class="row">
                    <button id="health-btn">Check Health</button>
                    <button id="clear-log">Clear Saved Token</button>
                </div>
                <pre id="output" class="output">Ready.</pre>
            </section>
        </div>
        <!-- LRU CACHE STATUS -->
<section class="card" id="lru-card">
    <h2>LRU Cache Status</h2>

    <div class="row">
        <button id="refresh-lru">Refresh LRU</button>
    </div>

    <div id="lru-container" class="lru-container"></div>

    <pre id="lru-info" class="output">
LRU details will appear here.
    </pre>
</section>

        <section class="card" id="kv-card">
            <h2>Key-Value Operations</h2>

            <div class="forms-container">
                <form id="set-form" class="form-box">
                    <h3>Set Key</h3>
                    <label>Key<input id="set-key" required></label>
                    <label>Value<input id="set-value" required></label>
                    <label>TTL (seconds, optional)<input id="set-ttl" type="number" min="1"></label>
                    <div class="row"><button type="submit">Set Key</button></div>
                </form>

                <form id="get-form" class="form-box">
                    <h3>Get Key</h3>
                    <label>Key<input id="get-key" required></label>
                    <div class="row"><button type="submit">Get Key</button></div>
                </form>

                <form id="delete-form" class="form-box">
                    <h3>Delete Key</h3>
                    <label>Key<input id="delete-key" required></label>
                    <div class="row"><button type="submit" class="danger">Delete Key</button></div>
                </form>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
